<!DOCTYPE html>
<html lang='es'>
<head>
  <meta charset='UTF-8'>
  <title>{% block title %}CRUD Pedidos{% endblock %}</title>
  <!-- Bootstrap 5 -->
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
  <!-- SweetAlert2 -->
  <link href='https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css' rel='stylesheet'>
</head>
<body>
  <nav class='navbar navbar-dark bg-primary mb-4'>
    <div class='container'>
      <span class='navbar-brand'>🛒 CRUD Pedidos</span>
      <div class='d-flex gap-3'>
        <a class='btn btn-outline-light btn-sm' href='{% url "cliente-list" %}' title="Clientes"><i class="bi bi-people"></i></a>
        <a class='btn btn-outline-light btn-sm' href='{% url "producto-list" %}' title="Productos"><i class="bi bi-box-seam"></i></a>
        <a class='btn btn-outline-light btn-sm' href='{% url "pedido-list" %}' title="Pedidos"><i class="bi bi-receipt"></i></a>
        <form method="post" action="{% url 'logout' %}" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger btn-sm" title="Salir">
            <i class="bi bi-box-arrow-right"></i>
          </button>
        </form>
      </div>
    </div>
  </nav>
  <div class='container'>
    {% for msg in messages %}
      <div class='alert alert-{{ msg.tags }}'>{{ msg }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </div>
  <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js'></script>
  <script src='https://cdn.jsdelivr.net/npm/sweetalert2@11'></script>
  {% block scripts %}{% endblock %}
</body>
</html>
